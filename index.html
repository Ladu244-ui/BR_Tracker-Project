<!DOCTYPE html> 
<html lang="en">
     <head> 
        <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>Bible Reading Tracker</title> 
        <link rel="stylesheet" href="styles.css"> 
              <!-- FullCalendar CSS -->
        <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/main.min.css" rel="stylesheet">
        <script src="https://unpkg.com/lucide@latest"></script>
     </head>
     <body> 
        <div class="container">
            <!-- Background Elements --> 
           <div class="background">
               <div class="pattern-sacred"></div> 
               <div class="gradient-radial"></div> 
               <div class="floating-orb orb-1"></div> 
               <div class="floating-orb orb-2"></div> 
               <div class="floating-orb orb-3"></div> 
               <div class="parallax-container"> 
                  <div class="parallax-layer-1"></div>
                  <div class="parallax-layer-2"></div> 
               </div> 
          </div>
           <!--Header-->
           <h1>Bible Reading Tracker</h1>
           <!--Today's Scripture-->
           <div class="content">
               <div class="floating-container scripture">
                   <!-- Progress Section at Top Left -->
                   <div class="progress-container">
                       <div class="progress-bar">
                           <div class="progress-fill" id="progress-fill"></div>
                       </div>
                   </div>
                   <h2>Today's Scriptures</h2>
                   <div class="icon">📖</div>
                   <div id="verse-of-the-day"> 
                       <p id="verse-text">Loading...</p>
                   </div> 
               </div>
               <!--Time Table-->
               <div class="floating-container timetable">
                   <h2>Full Month TimeTable:</h2>
                   <select class="controls" id="month-select"> 
                       <option value="January">January</option>
                       <option value="February">February</option>
                       <option value="March">March</option>
                       <option value="April">April</option>
                       <option value="May">May</option>
                       <option value="June">June</option>
                       <option value="July">July</option>
                       <option value="August">August</option>
                       <option value="September">September</option>
                       <option value="October">October</option>
                       <option value="November">November</option>
                       <option value="December">December</option> 
                   </select>
                   <button class="btn-dark" id="get-reading">View</button> 
                   <div id="reading-plan"></div>
               </div>
               <!--Search Section-->
               <div class="floating-container Search-Bible">
                   <h2>Search The Bible</h2>
                   <div class="search-container">
                       <input type="text"  id="search-input" placeholder="Enter a verse or keyword...">
                       <button  class = "btn-dark" id="search-button">🔍</button>
                       <div id="search-results"></div> 
                   </div>
               </div>
               <!--Web Definitions-->
               <div class="floating-container definitions">
                   <h2>Web Definitions</h2>
                   <div class="search-container">
                       <script async src="https://cse.google.com/cse.js?cx=969b4787e8f324a70">
                       </script>
                       <div class="gcse-search"></div> 
                   </div>
               </div>
               <!--Reading progress Tracker-->
               <div class="floating-container Reading-progress"> 
                   <div class="decorative-orb top-right"></div> 
                   <div class="decorative-orb bottom-left"></div> 
                   <h2 class="section-title"> 
                       <div class="title-bar"></div> Log Your Reading 
                   </h2> 
                   <form class="reading-form"> 
                       <div class="input-group" id="reading-progress" > 
                           <label class="flex-between"> <span>Scripture Range</span> 
                               <button type="button" class="info-button" id="hint-button"> 
                                   <i data-lucide="info" class="icon-info"></i> 
                               </button> 
                           </label> 
                           <div class="hint-popup" id="hint-popup"> 
                               Examples: 
                               <span>• John 3:16</span> 
                                
                           </div> 
                                   
                               <input type="text" id="book" placeholder="e.g., John 3:16-21"> 
                           </div> 
                           <div class="info-box"> 
                               <i data-lucide="book-open" class="icon-book"></i> 
                               <span>Track your journey through scripture, one passage at a time.</span> 
                           </div> 
                           <button id="log-Reading" class="btn-primary"> 
                               <i data-lucide="book-open" class="icon-book"></i> 
                               <span>Log Reading</span> 
                           </button> 
                       </div>
                   </form> 
               </div> 
                 <!-- Calendar Section --> 
               <div class="floating-container calender"> 
                   <div class="calendar-header"> 
                       <h2 class="section-title"> 
                           <div class="title-bar"></div> Reading Calendar 
                       </h2> 
                       <!--<div class="view-buttons"> 
                           <button class="btn-dark">month</button> 
                           <button class="btn-dark">week</button> 
                           <button class="btn-dark">day</button> 
                       </div> -->
                   </div> 
                   <div class="calendar" id="calendar"></div> 
                    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/main.min.js"></script>
               </div>
               
           </div>
        </div> 
        <script type="module" src="script.js"></script>
        <script src="int.calender.js"></script>
        <script src="script2.js"></script>
    </body> 
</html>
