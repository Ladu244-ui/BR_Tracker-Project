<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Reading Tracker</title>
    <link rel="stylesheet" href="styles.css">
   
    <!-- FullCalendar CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
<script type="module" src="script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Bible Reading Tracker</h1>


        <!--Verse of the Day-->
        <div id="verse-of-the-day">
            <h2>Today's Scriptures</h2>
            <p id="verse-text">Loading...</p>
        </div>

        <!--Search for the full monthly Reading-->
        <div id="monthly-reading">
            <h2>Full Month Schedule</h2>
            <input type="month" id="month" value="2025-09">
            <button id="get-reading">Get Reading</button>
            <p id="reading-plan">Reading Plan will appear here</p>

        <!--Reading Tracker-->
        <div id="reading-tracker">
            <h2>Track Your Reading</h2>
            <input type="text" id="book" placeholder="Book">
            <input type="number" id="chapter" placeholder="Chapter">
            <input type="number" id="verse" placeholder="Verse">
            <button id="log-Reading">Log Reading</button>
            <p id="progress">Progress: 0%</p>
        </div>

        <!--Search Functionality-->
        <div id="search">
            <h2>Search The Bible</h2>
            <input type="text" id="search-input" placeholder="Enter a verse or keyword">
            <button id="search-button">Search</button>
            <div id="search-results"></div>
        </div>

        <!--Google Search-->
        <div id="google-search">
            <h2>Search the Web for definitions or explanations</h2>
            <script async src="https://cse.google.com/cse.js?cx=969b4787e8f324a70">
            </script>
            <div class="gcse-search"></div>
        </div>

        <!--ChatGPT-->
        <div id="chatgpt">
            <h2>Ask ChatGPT</h2>
            <input type="text" id="chatgpt-input" placeholder="Ask a question">
            <button id="chatgpt-button">Ask</button>
            <p id="chatgpt-response">Response will appear here</p>
        </div>

        <!--Calender-->
        <div id="calender"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
